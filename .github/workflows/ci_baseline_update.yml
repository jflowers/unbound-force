# SPDX-License-Identifier: Apache-2.0
#
# CRAP Baseline Update
# ====================
# Regenerates .gaze/baseline.json on the CI runner after
# each merge to main. Ensures the CRAP baseline reflects
# the same environment (OS, Go version, tool availability)
# as the PR CRAP Load Analysis check, preventing false
# regressions from cross-platform coverage differences.

name: CRAP Baseline Update

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: baseline-update
  cancel-in-progress: true

jobs:
  update-baseline:
    name: Update CRAP Baseline
    # Skip if this push was made by the bot (prevents
    # recursive triggers from baseline commits)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
        env:
          GOTOOLCHAIN: local

      - name: Install Gaze
        run: go install github.com/unbound-force/gaze/cmd/gaze@latest

      - name: Generate baseline
        run: |
          gaze crap --format=json ./... 2>/dev/null \
            | python3 -c "
          import sys, json
          data = sys.stdin.read()
          idx = data.find('{')
          if idx >= 0:
              obj = json.loads(data[idx:])
              json.dump(obj, sys.stdout, indent=2)
          " > /tmp/new-baseline.json
          cp /tmp/new-baseline.json .gaze/baseline.json

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet .gaze/baseline.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push baseline
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gaze/baseline.json
          git commit -m "chore: update CRAP baseline [skip ci]"
          git push
